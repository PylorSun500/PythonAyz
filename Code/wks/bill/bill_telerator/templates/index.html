<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bill Telerator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>
  <body>
    <div class="app-frame">
      <header class="topbar">
        <h1 class="app-title">Bill Telerator</h1>
        <div class="topbar-meta">
          <span id="todayLabel" class="chip">--</span>
          <span id="weekLabel" class="chip">--</span>
        </div>
      </header>

      <main class="layout">
        <section class="panel panel-accent budget-panel">
          <div class="panel-header">
            <h2>预算设置</h2>
            <span class="status-chip" id="settingsStatus">等待载入</span>
          </div>
          <div class="panel-body">
            <form id="settingsForm" class="budget-form">
              <label>
                <span>日预算</span>
                <input type="number" name="daily_budget" min="0.01" step="0.01" required />
              </label>
              <label>
                <span>周预算</span>
                <input type="number" name="weekly_budget" min="0.01" step="0.01" required />
              </label>
              <button type="submit" class="wide">保存预算</button>
            </form>
          </div>
        </section>

        <section class="panel bill-panel">
          <div class="panel-header">
            <h2>账单录入</h2>
                          <div class="form-actions">
                <button type="submit">提交账单</button>
                <button type="reset" class="ghost-button">清空</button>
              </div>
            <span class="status-chip soft" id="billStatus">等待输入</span>
          </div>
          <div class="panel-body">
            <form id="billForm" class="bill-form">
              <label>
                <span>消费日期</span>
                <input type="date" name="date" required />
              </label>
              <label>
                <span>消费类别</span>
                <input type="text" name="category" list="categorySuggestions" placeholder="如 餐饮 / 交通 / 学习" required />
                <datalist id="categorySuggestions">
                  <option value="餐饮"></option>
                  <option value="交通"></option>
                  <option value="学习"></option>
                  <option value="娱乐"></option>
                  <option value="购物"></option>
                  <option value="住房"></option>
                </datalist>
              </label>
              <label>
                <span>消费金额</span>
                <input type="number" name="amount" min="0.01" step="0.01" placeholder="0.00" required />
              </label>
              <label>
                <span>备注</span>
                <input type="text" name="note" placeholder="例如：和同学聚餐" />
              </label>
            </form>
          </div>
        </section>

        <div class="side-column">
          <section class="panel stats-panel">
            <div class="panel-header">
              <h2>预算状态</h2>
            </div>
            <div class="panel-body scroll-y stat-cards" id="statCards"></div>
          </section>

          <section class="panel breakdown-panel">
            <div class="panel-header">
              <h2>本周结构</h2>
            </div>
            <div class="panel-body scroll-y breakdown-list" id="categoryBreakdown"></div>
          </section>

          <section class="panel flagged-panel">
            <div class="panel-header">
              <h2>高金额提醒</h2>
            </div>
            <div class="panel-body scroll-y flagged-list" id="flaggedList"></div>
          </section>
        </div>

        <section class="panel history-panel">
          <div class="panel-header">
            <h2>历史账单</h2>
          </div>
          <div class="panel-body scroll-y table-wrap">
            <table>
              <thead>
                <tr>
                  <th>日期</th>
                  <th>类别</th>
                  <th>金额</th>
                  <th>备注</th>
                  <th>超支原因</th>
                  <th>惩罚扣减</th>
                </tr>
              </thead>
              <tbody id="billTableBody"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <div
      id="overspendOverlay"
      class="modal-overlay hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="overspendTitle"
    >
      <div class="modal">
        <div class="modal-header">
          <div>
            <p class="modal-tag">超支警示</p>
            <h3 id="overspendTitle">需要补充超支原因</h3>
          </div>
          <button type="button" class="icon-button" id="closeOverspendBtn" aria-label="关闭">
            ×
          </button>
        </div>
        <p id="overspendSummary" class="modal-summary"></p>
        <label>
          <span>超支原因</span>
          <textarea id="overspendReason" rows="3" placeholder="请说明为什么这笔支出必须发生"></textarea>
        </label>
        <div class="modal-actions">
          <button type="button" id="confirmOverspendBtn">确认保存并扣减周预算</button>
          <button type="button" id="cancelOverspendBtn" class="ghost-button danger-ghost">取消此次提交</button>
        </div>
        <div class="modal-review">
          <h4>本日消费审查列表</h4>
          <ul id="todayReviewList" class="review-list"></ul>
        </div>
      </div>
    </div>

    <div id="toast" class="toast hidden"></div>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>
